<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Card</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="heart"></canvas>

    <div class="content">
        <h1>I Love You ❤️</h1>

        <button id="openBtn">
            Открыть письмо
        </button>
    </div>

    <div class="letter" id="letter">

        <p>
            Каждый день с тобой, это чудо.<br>
            Ты моё самое красивое сердце в мире,<br>
            моя самая самая нежная любовь.<br>
            Спасибо, что ты есть.<br>
            Я люблю тебя сильнее, чем вчера,<br>
            и меньше, чем завтра.
        </p>

        <button id="closeBtn">
            Закрыть
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
