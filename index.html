<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Романтическая открытка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container">
        <div class="card">
            <div class="heart">❤</div>
            <p class="message">
                Каждый день с тобой — это чудо.<br>
                Ты моё самое красивое сердце в мире,<br>
                моя самая-самая нежная любовь.<br>
                Спасибо, что ты есть.<br>
                Я люблю тебя сильнее, чем вчера,<br>
                и меньше, чем завтра.
            </p>
            <button id="loveButton">Нажми меня</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
