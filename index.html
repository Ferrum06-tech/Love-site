<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Я люблю тебя, Яна ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>

    <h2 class="title">Для моей Яны</h2>
    
    <div class="heart-container">
        <canvas id="heartCanvas" width="420" height="420"></canvas>
    </div>

    <button class="love-button" id="loveButton">
        Я люблю тебя, Яна
    </button>

    <!-- Открытка -->
    <div class="envelope" id="envelope">
        <button class="close-btn" id="closeBtn">✕</button>
        <div class="card">
            <h1>My darling</h1>
            <p>Каждый день с тобой, это чудо.<br>
               Ты моё самое красивое сердце в мире,<br>
               моя самая самая нежная любовь.<br><br>
               Спасибо, что ты есть.<br>
               Я люблю тебя сильнее, чем вчера,<br>
               и меньше, чем завтра.</p>
            <div class="heart-small">❤️</div>
            <p class="signature">Твой навсегда</p>
        </div>
    </div>

    <footer>Сделано с любовью For You</footer>

    <script src="script.js"></script>
</body>
</html>
